# nginx config for the frontend container — this is the "front desk".
# Dropped into /etc/nginx/conf.d/default.conf, so it's a `server { }` block that
# nginx's main config includes inside its http { } context.
server {
    listen 80;
    server_name _;

    # Basic Auth gate (or empty = no auth). The file is written at container start
    # by /docker-entrypoint.d/40-basic-auth.sh from the BASIC_AUTH_* env vars.
    # Placed at the server level so it protects BOTH the app and /api.
    include /etc/nginx/conf.d/auth.inc;

    root /usr/share/nginx/html;
    index index.html;

    # Job 1: serve the static React app. `try_files` looks for the requested file
    # and falls back to index.html, so the single-page app's entry point is always
    # returned instead of a 404.
    location / {
        try_files $uri /index.html;
    }

    # Job 2: reverse-proxy API calls to the backend container. "backend" is the
    # docker-compose SERVICE NAME, which Docker's internal DNS resolves to that
    # container. The request path is preserved (no trailing slash on proxy_pass),
    # so /api/chat is forwarded as /api/chat.
    location /api/ {
        # Resolve the backend container name at REQUEST time via Docker's embedded
        # DNS (127.0.0.11), by putting the host in a variable. This way nginx still
        # STARTS even if the backend container isn't up/resolvable yet — instead of
        # the default behavior of resolving at startup and crashing with "host not
        # found in upstream". $request_uri preserves the full path + query.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream backend:8000;
        proxy_pass http://$backend_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;

        # CRITICAL for streaming. By default nginx BUFFERS the upstream response
        # and only forwards it once a chunk is large/complete — which would make
        # the streamed answer arrive all at once at the end. Turning buffering off
        # passes each NDJSON line straight through to the browser as it's produced.
        proxy_buffering off;
        proxy_cache off;

        # The agent loop can run several model turns; give it room before timing out.
        proxy_read_timeout 300s;
    }
}
